name: smoke

# Runs every recipe's smoke_test.py — on change and nightly — so a recipe that
# breaks against live prod turns this build red instead of rotting in a doc.
# Per-recipe contract (see each smoke_test.py): exit 0 = pass, 1 = failed,
# 2 = skipped (missing creds). Only a real failure reds the build, so this stays
# green until the canary secrets below are set in repo settings:
#   HIGHFLAME_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY
on:
  push:
  pull_request:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC nightly, against the canary tenant
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run every recipe's smoke test
        env:
          HIGHFLAME_API_KEY: ${{ secrets.HIGHFLAME_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -uo pipefail
          # Recipes nest at varying depths (e.g. recipes/aperture/01-block-secrets/),
          # so discover smoke tests at any depth rather than a single level.
          failed=0
          while IFS= read -r f; do
            d="$(dirname "$f")/"
            echo "::group::smoke ${d}"
            if [ -f "${d}requirements.txt" ]; then
              pip install -q -r "${d}requirements.txt"
            fi
            rc=0
            python "$f" || rc=$?
            echo "::endgroup::"
            case "$rc" in
              0) echo "::notice::passed ${d}" ;;
              2) echo "::notice::skipped ${d} — smoke test reported missing credentials" ;;
              *) echo "::error::smoke FAILED for ${d} (exit ${rc})"; failed=1 ;;
            esac
          done < <(find recipes -name smoke_test.py | sort)
          exit "$failed"
